name: Testes

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  testar-python:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar Dependências
      # requirements.txt do RapidOCR: cobre numpy + pytest, o suficiente para importar e testar os
      # módulos compartilhados e os manifestos/funções puras de todos os motores (o restante das
      # dependências pesadas — onnxruntime, torch, easyocr — só é importado em runtime real, dentro
      # dos métodos _inicializarOcr de cada motor, não durante a coleta/execução dos testes).
      run: |
        python -m pip install --upgrade pip
        pip install -r python_backend/motores/rapidocr/requirements.txt

    - name: Executar Testes
      # pytest.ini mora em python_backend/ (pythonpath/testpaths relativos a ele).
      run: pytest
      working-directory: python_backend

  testar-go:
    # Windows: o app é Windows-only — wails_app/mouse tem build constraints de Windows e o hotkey exige
    # headers X11 (cgo) no Linux. Em ubuntu o `go test ./...` falha no compile. Roda no runner do alvo.
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v4

    - name: Configurar Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Frontend dist mínimo
      # O wails_app/main.go tem //go:embed all:frontend/dist, que exige a pasta em compile-time. No CI
      # (checkout limpo) o dist ainda não foi buildado; os testes não usam o frontend, então basta um
      # arquivo mínimo para o embed compilar.
      run: |
        mkdir -p wails_app/frontend/dist
        echo "<!doctype html><title>test</title>" > wails_app/frontend/dist/index.html

    - name: Executar Testes (raiz + wails_app)
      run: |
        go test ./...
        cd wails_app && go test ./...
