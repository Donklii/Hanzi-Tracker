name: Testes

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  testar-python:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Instalar Dependências
      # requirements.txt do RapidOCR: cobre numpy + pytest, o suficiente para importar e testar os
      # módulos compartilhados e os manifestos/funções puras de todos os motores (o restante das
      # dependências pesadas — onnxruntime, torch, easyocr — só é importado em runtime real, dentro
      # dos métodos _inicializarOcr de cada motor, não durante a coleta/execução dos testes).
      run: |
        python -m pip install --upgrade pip
        pip install -r python_backend/motores/rapidocr/requirements.txt

    - name: Executar Testes
      # pytest.ini mora em python_backend/ (pythonpath/testpaths relativos a ele).
      run: pytest
      working-directory: python_backend

  testar-go:
    # Runner do alvo principal (Windows). O port Linux tem job próprio (testar-go-linux, abaixo).
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions/checkout@v4

    - name: Configurar Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Frontend dist mínimo
      # O wails_app/main.go tem //go:embed all:frontend/dist, que exige a pasta em compile-time. No CI
      # (checkout limpo) o dist ainda não foi buildado; os testes não usam o frontend, então basta um
      # arquivo mínimo para o embed compilar.
      run: |
        mkdir -p wails_app/frontend/dist
        echo "<!doctype html><title>test</title>" > wails_app/frontend/dist/index.html

    - name: Executar Testes (raiz + wails_app)
      run: |
        go test ./...
        cd wails_app && go test ./...

  testar-go-linux:
    # Compila e testa o port Linux do app. GTK/WebKit/X11 são exigidos pelo cgo (Wails + hotkey); a
    # tag webkit2_41 casa com o build do publicar-app-linux.yml. Também valida os manifestos Linux dos
    # motores (artefatos_*_linux.json), que o job Windows não enxerga (a escolha é por runtime.GOOS).
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configurar Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Instalar dependências de build (GTK/WebKit/X11 + xvfb)
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev xvfb

    - name: Frontend dist mínimo
      # Mesmo motivo do job Windows: o //go:embed all:frontend/dist exige a pasta em compile-time.
      run: |
        mkdir -p wails_app/frontend/dist
        echo "<!doctype html><title>test</title>" > wails_app/frontend/dist/index.html

    - name: Executar Testes (raiz + wails_app)
      # xvfb-run: o init() da lib de hotkey (X11) aborta o processo sem um display; o teste do pacote
      # raiz wails_app linka essa lib, então precisa de um X virtual mesmo sem abrir janela nenhuma.
      run: |
        go test ./...
        cd wails_app && xvfb-run -a go test -tags webkit2_41 ./...
