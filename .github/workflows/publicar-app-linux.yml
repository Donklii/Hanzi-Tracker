name: Publicar App Linux (.deb)

# Builda o app Wails (Go + React) para Linux e publica o pacote .deb em GitHub Releases, espelhando o
# publicar-app-windows.yml (Windows):
#   - push na main:      .deb "dev" anexado à MESMA prerelease rolante "app-dev" do workflow Windows,
#                         com nome FIXO (hanzitracker_dev_amd64.deb) para o upload substituir o anterior.
#   - tag "app-v*":       .deb estável e versionado, anexado à MESMA release do instalador Windows.
#   - workflow_dispatch:  disparo manual; mesma regra (tag app-v* = estável, branch = dev).
#
# Diferenças em relação ao Windows:
#   - Não há tela de escolha de motores (o NSIS é Windows-only) e os motores publicados (PyInstaller)
#     ainda são só .exe — o app Linux sobe sem OCR (guard motoresDisponiveisNesteSO, em motores.go).
#   - Build no ubuntu-latest (24.04) com WebKitGTK 4.1 (tag webkit2_41): o .deb requer distros com
#     libwebkit2gtk-4.1 e glibc compatível (Ubuntu 24.04+, Debian 13+, Mint 22+). O runner ubuntu-22.04
#     geraria binário mais portátil, mas entra em depreciação em 09/2026.
#   - A release é publicada com o gh CLI em vez do softprops/action-gh-release: os dois workflows
#     disparam no mesmo push e anexam na MESMA release, e o gh permite tratar a corrida de criação
#     (se o Windows criar a release primeiro, o upload anexa nela mesmo assim).

on:
  push:
    branches: [main]
    tags:
      - 'app-v*'
  workflow_dispatch: {}

permissions:
  contents: write # criar/atualizar a release e anexar o .deb

jobs:
  publicar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Go
        uses: actions/setup-go@v5
        with:
          go-version-file: wails_app/go.mod

      - name: Configurar Node (frontend)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependências de build (GTK/WebKit/X11 + xvfb)
        # GTK+WebKit são o runtime de janela do Wails no Linux; libx11-dev é exigido pelo cgo da lib
        # de atalhos globais (golang.design/x/hotkey). xvfb é necessário porque o init() dessa lib
        # abre um display X11 e aborta o processo se não houver nenhum (runner é headless) — mesmo
        # motivo do testes.yml.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgtk-3-dev libwebkit2gtk-4.1-dev libx11-dev xvfb

      - name: Instalar o Wails CLI
        # Fixado na MESMA versão de github.com/wailsapp/wails/v2 usada em wails_app/go.mod — ao
        # atualizar uma, atualize a outra junto (regra do publicar-app-windows.yml).
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Calcular a versão do app
        id: versao
        run: |
          if [[ "$GITHUB_REF" == refs/tags/app-v* ]]; then
            # Release estável: a versão vem da própria tag (ex.: app-v1.2.0 -> 1.2.0).
            versao="${GITHUB_REF#refs/tags/app-v}"
            if [[ ! "$versao" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Tag de release inválida: '$GITHUB_REF' — esperado 'app-vX.Y.Z' (ex.: app-v1.2.0)." >&2
              exit 1
            fi
            {
              echo "versao=$versao"
              echo "tag=app-v$versao"
              echo "estavel=true"
              echo "titulo=Hanzi Tracker $versao"
              echo "nomeDeb=hanzitracker_${versao}_amd64.deb"
            } >> "$GITHUB_OUTPUT"
          else
            # Build de dev: versão numérica pelo número sequencial do workflow. O run_number é POR
            # WORKFLOW, então difere do instalador Windows do mesmo commit — quem identifica a build é
            # o sha no título da release. Nome de arquivo FIXO para a prerelease rolante substituir o
            # .deb anterior em vez de acumular um por push.
            versao="0.0.$GITHUB_RUN_NUMBER"
            sha="${GITHUB_SHA:0:7}"
            {
              echo "versao=$versao"
              echo "tag=app-dev"
              echo "estavel=false"
              echo "titulo=Hanzi Tracker (dev, commit $sha)"
              echo "nomeDeb=hanzitracker_dev_amd64.deb"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Gravar a versão calculada em wails.json
        run: |
          jq --arg v '${{ steps.versao.outputs.versao }}' '.info.productVersion = $v' wails_app/wails.json > /tmp/wails.json
          mv /tmp/wails.json wails_app/wails.json

      - name: Buildar o app (wails build linux)
        working-directory: wails_app
        # A tag webkit2_41 linka contra o WebKitGTK 4.1 — o 4.0 não existe mais no Ubuntu 24.04.
        # xvfb-run: a geração de bindings executa código que importa a lib de hotkey (X11), que aborta
        # sem um display mesmo sem abrir janela nenhuma — mesmo motivo do testes.yml.
        run: |
          xvfb-run -a wails build -platform linux/amd64 -tags webkit2_41
          if [[ ! -f build/bin/HanziTracker ]]; then
            echo 'wails build terminou sem gerar build/bin/HanziTracker' >&2
            exit 1
          fi

      - name: Montar o pacote .deb
        run: |
          bash wails_app/linux-instalador/montar_deb.sh \
            '${{ steps.versao.outputs.versao }}' \
            wails_app/build/bin/HanziTracker \
            'wails_app/build/bin/${{ steps.versao.outputs.nomeDeb }}'

      - name: Publicar a release
        env:
          GH_TOKEN: ${{ github.token }}
        # Se a release ainda não existe, cria (o `|| true` cobre a corrida com o workflow Windows
        # criando a mesma release no mesmo instante); o upload com --clobber anexa/substitui o .deb.
        run: |
          arquivo='wails_app/build/bin/${{ steps.versao.outputs.nomeDeb }}'
          tag='${{ steps.versao.outputs.tag }}'
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            extra=()
            if [[ '${{ steps.versao.outputs.estavel }}' != 'true' ]]; then
              extra+=(--prerelease)
            fi
            gh release create "$tag" --repo "$GITHUB_REPOSITORY" \
              --title '${{ steps.versao.outputs.titulo }}' \
              --target "$GITHUB_SHA" "${extra[@]}" --notes '' || true
          fi
          gh release upload "$tag" "$arquivo" --repo "$GITHUB_REPOSITORY" --clobber
